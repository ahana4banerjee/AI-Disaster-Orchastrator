version: '3.8'

services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb+srv://user:password@cluster.mongodb.net/disaster_db
      - REDIS_URI=redis://redis:6379/0
      - ML_SERVICE_URL=http://ml_service:8001
    depends_on:
      - redis
      
  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - REDIS_URI=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
